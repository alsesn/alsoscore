<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(title='Управление Тестами', content=~{::content})}">
<body>

<div th:fragment="content">
    <h1 class="mb-4 text-dark">📋 Управление Тестами</h1>

    <div class="card shadow-lg mb-5 border-success">
        <div class="card-header bg-success text-white">
            <h5 class="mb-0">➕ Создать Новый Тест</h5>
        </div>
        <div class="card-body">
            <form th:action="@{/admin/tests/create}" th:object="${newTest}" method="post">
                <div class="row g-3">
                    <div class="col-md-5">
                        <label for="title" class="form-label">Название:</label>
                        <input type="text" id="title" th:field="*{title}" class="form-control" required>
                    </div>
                    <div class="col-md-7">
                        <label for="description" class="form-label">Описание:</label>
                        <textarea id="description" th:field="*{description}" class="form-control" rows="1"></textarea>
                    </div>
                </div>
                <button type="submit" class="btn btn-success mt-3">Создать Тест</button>
            </form>
        </div>
    </div>

    <h2 class="mb-3">Список Тестов</h2>

    <div th:if="${tests.isEmpty()}" class="alert alert-info text-center py-4 border-info">
        В системе пока нет созданных тестов. Начните с создания первого!
    </div>

    <div th:unless="${tests.isEmpty()}" class="table-responsive">
        <table class="table table-bordered table-hover shadow-sm">
            <thead class="bg-primary text-white">
            <tr>
                <th>ID</th>
                <th>Название</th>
                <th>Статус</th>
                <th>Действия</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="test : ${tests}">
                <td th:text="${test.id}" class="align-middle"></td>
                <td th:text="${test.title}" class="align-middle"></td>
                <td class="align-middle">
                    <span th:classappend="${test.status != null and test.status.name() == 'PUBLISHED'} ? 'badge text-bg-success' : 'badge text-bg-warning'"
                          th:text="${test.status != null ? test.status : 'DRAFT (NULL)'}"></span>
                </td>
                <td class="align-middle">
                    <a th:href="@{/admin/tests/{testId}/edit(testId=${test.id})}" class="btn btn-sm btn-outline-primary me-2">
                        ✏️ Редактировать
                    </a>

                    <span th:if="${test.status == null or (test.status != null and test.status.name() == 'DRAFT')}">
                        <form th:action="@{/admin/tests/{testId}/publish(testId=${test.id})}" method="post" class="d-inline">
                            <button type="submit" class="btn btn-sm btn-success">🚀 Опубликовать</button>
                        </form>
                    </span>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
